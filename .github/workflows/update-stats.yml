name: Update Stats SVGs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/update-stats.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=caiocv18&show_icons=true&include_all_commits=true&count_private=true&hide_border=true&bg_color=1a0b2e&title_color=ff6ec7&text_color=b8c5d6&icon_color=00f5ff&ring_color=ffce5c'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top-langs card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=caiocv18&layout=compact&langs_count=10&hide_border=true&bg_color=1a0b2e&title_color=ff6ec7&text_color=b8c5d6'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - duolibras
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: 'username=caiocv18&repo=duolibras&hide_border=true&bg_color=1a0b2e&title_color=ff6ec7&text_color=b8c5d6&icon_color=00f5ff'
          path: profile/pin-duolibras.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - projeto-perguntas
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: 'username=caiocv18&repo=projeto-perguntas&hide_border=true&bg_color=1a0b2e&title_color=ff6ec7&text_color=b8c5d6&icon_color=00f5ff'
          path: profile/pin-projeto-perguntas.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - xadrez
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: 'username=caiocv18&repo=xadrez&hide_border=true&bg_color=1a0b2e&title_color=ff6ec7&text_color=b8c5d6&icon_color=00f5ff'
          path: profile/pin-xadrez.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - CRUD-Deposito
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: 'username=caiocv18&repo=CRUD-Deposito&hide_border=true&bg_color=1a0b2e&title_color=ff6ec7&text_color=b8c5d6&icon_color=00f5ff'
          path: profile/pin-CRUD-Deposito.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - alura_agenda
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: 'username=caiocv18&repo=alura_agenda&hide_border=true&bg_color=1a0b2e&title_color=ff6ec7&text_color=b8c5d6&icon_color=00f5ff'
          path: profile/pin-alura_agenda.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - agent-code-cli-java
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: 'username=caiocv18&repo=agent-code-cli-java&hide_border=true&bg_color=1a0b2e&title_color=ff6ec7&text_color=b8c5d6&icon_color=00f5ff'
          path: profile/pin-agent-code-cli-java.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git -c commit.gpgsign=false commit -m "chore: update stats SVGs [skip ci]"
          git push
